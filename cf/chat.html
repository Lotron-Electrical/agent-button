<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0d0d0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Agent chat</title>
<style>
  :root{
    --bg:#0d0d0d; --panel:#161616; --panel2:#1d1d1d; --line:#2a2a2a;
    --ink:#ece7e1; --dim:#8a847c; --accent:#C15F3C; --accent2:#e0794f; --ok:#5fb87a; --err:#d9655a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    background:var(--bg); color:var(--ink); font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    display:flex; flex-direction:column; height:100dvh;
  }
  header{
    display:flex; align-items:center; gap:10px; padding:max(12px,env(safe-area-inset-top)) 14px 12px;
    border-bottom:1px solid var(--line); background:linear-gradient(180deg,#1a1411,#0d0d0d);
  }
  .back{color:var(--accent2); text-decoration:none; font-size:20px; padding:2px 6px}
  .hclose{flex:none; width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--panel); color:var(--dim); font-size:14px; display:flex; align-items:center; justify-content:center; padding:0}
  .hclose:active{background:rgba(217,101,90,.18); color:var(--err); border-color:var(--err)}
  .htitle{flex:1; min-width:0}
  .htitle .n{font-size:15px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .htitle .s{font-size:11px; color:var(--dim); letter-spacing:.3px}
  .htitle .s.thinking{color:var(--accent2)}
  .htitle .s.error{color:var(--err)}
  #log{flex:1; overflow-y:auto; padding:16px 12px 6px; display:flex; flex-direction:column; gap:10px}
  .msg{max-width:86%; padding:11px 13px; border-radius:14px; font-size:14.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word}
  .msg.user{align-self:flex-end; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:#1a0f0a; border-bottom-right-radius:5px}
  .msg.agent{align-self:flex-start; background:var(--panel); border:1px solid var(--line); border-bottom-left-radius:5px}
  .msg.system{align-self:center; background:rgba(217,101,90,.12); border:1px solid rgba(217,101,90,.4); color:var(--err); font-size:13px; max-width:94%}
  .who{font-size:10px; letter-spacing:.5px; text-transform:uppercase; opacity:.65; margin-bottom:4px}
  .thinking-row{align-self:flex-start; display:flex; align-items:center; gap:8px; color:var(--dim); font-size:13px; padding:4px 2px}
  .spin{width:13px;height:13px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .composer{display:flex; gap:8px; padding:10px 12px calc(10px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg)}
  textarea{
    flex:1; resize:none; background:var(--panel); color:var(--ink); border:1px solid var(--line); border-radius:12px;
    padding:11px 13px; font:inherit; font-size:16px; outline:none; max-height:120px; min-height:46px;
  }
  textarea:focus{border-color:var(--accent)}
  .send{border:none; border-radius:12px; padding:0 18px; font:inherit; font-size:15px; font-weight:700; color:#1a0f0a;
        background:linear-gradient(135deg,var(--accent2),var(--accent)); min-width:64px}
  .send:disabled{opacity:.45}
  .empty{color:var(--dim); text-align:center; margin:auto; font-size:14px; line-height:1.8}
</style>
</head>
<body>
  <header>
    <a class="back" href="__START__/agents" title="back">‹</a>
    <div class="htitle"><div class="n" id="hname">Agent</div><div class="s" id="hstatus">…</div></div>
    <button class="hclose" id="hclose" title="close agent" aria-label="close agent">✕</button>
  </header>
  <div id="log"></div>
  <div class="composer">
    <textarea id="box" placeholder="Message this agent…" rows="1"></textarea>
    <button class="send" id="send">Send</button>
  </div>

<script>
const SECRET = "__SECRET__";
const START = "__START__";
const ID = new URLSearchParams(location.search).get('id') || '';
const $ = (i)=>document.getElementById(i);
let lastCount = -1, thinking = false;

function api(p, opts={}){ return fetch(p, { ...opts, headers:{ Authorization:'Bearer '+SECRET, ...(opts.headers||{}) } }); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function atBottom(){ const l=$('log'); return l.scrollHeight - l.scrollTop - l.clientHeight < 60; }

function render(agent, messages){
  if (agent){ $('hname').textContent = agent.title || ('Agent '+ID); }
  thinking = agent && agent.status === 'thinking';
  const st = $('hstatus');
  st.className = 's' + (thinking?' thinking':(agent&&agent.status==='error'?' error':''));
  st.textContent = agent ? (thinking ? 'thinking…' : (agent.status||'idle')) + (agent.cwd?(' · '+agent.cwd.replace(/^[A-Za-z]:\\Users\\[^\\]+/,'~').replace(/^\/[a-z]\/Users\/[^/]+/i,'~').replace(/\\/g,'/')):'') : 'not found';
  const stick = atBottom();
  const rows = (messages||[]).map(m=>{
    const cls = m.role==='user'?'user':(m.role==='system'?'system':'agent');
    const who = m.role==='agent'?'<div class="who">agent</div>':'';
    return '<div class="msg '+cls+'">'+who+esc(m.text)+'</div>';
  });
  if (thinking) rows.push('<div class="thinking-row"><div class="spin"></div>working on your message…</div>');
  if (!messages || !messages.length){ if(!thinking) rows.push('<div class="empty">No messages yet.</div>'); }
  $('log').innerHTML = rows.join('');
  if (stick) $('log').scrollTop = $('log').scrollHeight;
  $('send').disabled = false;
}

async function refresh(){
  if (!ID){ $('log').innerHTML='<div class="empty">No agent id.</div>'; return; }
  let data;
  try{ data = await (await api('/chat/get?id='+encodeURIComponent(ID))).json(); }catch(e){ return; }
  render(data.agent, data.messages);
}

async function send(){
  const text = $('box').value.trim();
  if (!text) return;
  $('box').value=''; $('box').style.height='46px';
  // optimistic
  const l=$('log'); l.insertAdjacentHTML('beforeend','<div class="msg user">'+esc(text)+'</div><div class="thinking-row"><div class="spin"></div>working on your message…</div>');
  l.scrollTop = l.scrollHeight;
  try{ await api('/chat/send',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id:ID, message:text }) }); }
  catch(e){}
  setTimeout(refresh, 600);
}

$('send').addEventListener('click', send);
$('hclose').addEventListener('click', async ()=>{
  if(!confirm('Close this agent? The chat will be removed.')) return;
  try{ await api('/chat/close',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ id:ID }) }); }catch(e){}
  location.href = START + '/agents';
});
$('box').addEventListener('keydown', (e)=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
$('box').addEventListener('input', ()=>{ const b=$('box'); b.style.height='46px'; b.style.height=Math.min(120,b.scrollHeight)+'px'; });

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
