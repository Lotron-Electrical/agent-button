<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0d0d0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Agents</title>
<style>
  :root{
    --bg:#0d0d0d; --panel:#161616; --panel2:#1d1d1d; --line:#2a2a2a;
    --ink:#ece7e1; --dim:#8a847c; --accent:#C15F3C; --accent2:#e0794f; --ok:#5fb87a; --warn:#d9a84f; --err:#d9655a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #1a1411 0%, var(--bg) 55%);
    color:var(--ink); font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    min-height:100%; padding:max(18px,env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
  }
  header{display:flex; align-items:center; gap:10px; margin-bottom:12px}
  .dot{width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent)}
  h1{font-size:17px; margin:0; letter-spacing:.5px; font-weight:600; flex:1}
  h1 span{color:var(--dim); font-weight:400}
  .spawnlink{font-size:13px; color:var(--accent2); text-decoration:none; border:1px solid var(--line); padding:7px 11px; border-radius:10px; white-space:nowrap}
  .spawnlink:active{background:var(--panel)}
  /* stats bar */
  .stats{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:11px 13px; margin-bottom:14px}
  .srow{display:flex; align-items:center; gap:10px; font-size:12px; margin:5px 0}
  .srow .lab{width:30px; color:var(--dim); letter-spacing:.4px}
  .srow .bar{flex:1; height:8px; background:var(--panel2); border-radius:6px; overflow:hidden}
  .srow .bar i{display:block; height:100%; border-radius:6px; background:linear-gradient(90deg,var(--accent2),var(--accent)); transition:width .4s}
  .srow .bar i.hot{background:linear-gradient(90deg,#d9a84f,#d9655a)}
  .srow .val{width:96px; text-align:right; color:var(--ink)}
  .shost{font-size:11px; color:var(--dim); margin-top:6px; display:flex; align-items:center; gap:6px}
  .shost .live{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 8px var(--ok)}
  .shost.off{color:var(--err)} .shost.off .live{background:var(--err);box-shadow:0 0 8px var(--err)}
  .sub{font-size:12px; color:var(--dim); margin:0 2px 14px; letter-spacing:.3px}
  /* cards */
  a.card{
    display:block; text-decoration:none; color:inherit; position:relative;
    background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px;
  }
  a.card:active{border-color:var(--accent)}
  .top{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .name{font-size:16px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1}
  .badge{font-size:11px; padding:3px 9px; border-radius:20px; letter-spacing:.4px; text-transform:uppercase; font-weight:600; white-space:nowrap}
  .badge.busy{color:#1a0f0a; background:var(--accent); animation:pulse 1.6s ease-in-out infinite}
  .badge.idle{color:var(--ok); background:rgba(95,184,122,.14); border:1px solid rgba(95,184,122,.35)}
  .badge.err{color:var(--err); background:rgba(217,101,90,.14); border:1px solid rgba(217,101,90,.4)}
  .badge.other{color:var(--dim); background:var(--panel2); border:1px solid var(--line)}
  .close{width:30px; height:30px; flex:none; border-radius:8px; border:1px solid var(--line); background:var(--panel2);
         color:var(--dim); font-size:17px; line-height:1; display:flex; align-items:center; justify-content:center; padding:0}
  .close:active{background:rgba(217,101,90,.18); color:var(--err); border-color:var(--err)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(193,95,60,.5)}50%{box-shadow:0 0 0 6px rgba(193,95,60,0)}}
  .meta{font-size:12px; color:var(--dim); margin-bottom:12px; line-height:1.5; word-break:break-all}
  .chatbtn{display:block; text-align:center; padding:12px; border-radius:11px; font-size:15px; font-weight:600;
        color:#1a0f0a; background:linear-gradient(135deg,var(--accent2),var(--accent)); box-shadow:0 6px 18px rgba(193,95,60,.3)}
  .empty{text-align:center; color:var(--dim); font-size:14px; line-height:2; margin-top:50px}
  .empty a{color:var(--accent2)}
  .seclabel{font-size:11px; color:var(--dim); letter-spacing:.6px; text-transform:uppercase; margin:20px 4px 10px; border-top:1px solid var(--line); padding-top:14px}
  .extcard{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px}
  .extlink{display:block; text-align:center; padding:11px; border-radius:11px; font-size:14px; font-weight:600; color:var(--accent2); border:1px solid var(--line); background:var(--panel2); text-decoration:none}
  .srelay{display:block; width:100%; margin-top:10px; padding:11px; border-radius:11px; font:inherit; font-size:14px; font-weight:600; cursor:pointer; border:1px solid var(--line); background:var(--panel2); text-align:center}
  .srelay.stop{color:var(--err)} .srelay.cont{color:var(--accent2)}
  .srelay:active{filter:brightness(1.15)} .srelay[disabled]{opacity:.5}
  .extlink:active{border-color:var(--accent)}
  .extnochat{text-align:center; padding:8px; font-size:12px; color:var(--dim)}
  .foot{text-align:center; color:var(--dim); font-size:11px; margin-top:18px; opacity:.7}
</style>
</head>
<body>
  <header>
    <div class="dot"></div>
    <h1>AGENTS <span>// your PC</span></h1>
    <a class="spawnlink" href="__START__">+ New</a>
  </header>
  <div class="stats" id="stats" style="display:none"></div>
  <div class="sub" id="sub">loading…</div>
  <div id="solveswrap"></div>
  <div id="list"></div>
  <div class="seclabel" id="extlabel" style="display:none">Other live agents on this PC</div>
  <div id="ext"></div>
  <div class="foot">tap an agent to chat · × to close · refreshes every 3s</div>

<script>
const SECRET = "__SECRET__";
const START = "__START__";
const $ = (id) => document.getElementById(id);

function api(p, opts){ return fetch(p, { ...(opts||{}), headers: { Authorization: 'Bearer ' + SECRET, ...((opts&&opts.headers)||{}) } }); }
function ago(ts){ if(!ts) return ''; let s=Math.max(0,Math.round((Date.now()-ts)/1000)); if(s<60)return s+'s'; if(s<3600)return Math.round(s/60)+'m'; return Math.round(s/3600)+'h'; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function shortCwd(c){ if(!c) return ''; return c.replace(/^[A-Za-z]:\\Users\\[^\\]+/, '~').replace(/^\/[a-z]\/Users\/[^/]+/i,'~').replace(/\\/g,'/'); }
function statusInfo(s){ s=String(s||'').toLowerCase(); if(s==='thinking'||s==='busy')return{label:'working',cls:'busy'}; if(s==='idle')return{label:'idle',cls:'idle'}; if(s==='live')return{label:'live',cls:'idle'}; if(s==='solved')return{label:'solved',cls:'idle'}; if(s==='error')return{label:'error',cls:'err'}; return{label:s||'new',cls:'other'}; }

function renderStats(st){
  const el = $('stats');
  if(!st || !st.ts){ el.style.display='none'; return; }
  el.style.display='block';
  const fresh = (Date.now()-st.ts) < 20000;
  const cpu = Math.max(0,Math.min(100, st.cpuPct||0));
  const ram = Math.max(0,Math.min(100, st.ramPct||0));
  el.innerHTML =
    '<div class="srow"><span class="lab">CPU</span><div class="bar"><i class="'+(cpu>85?'hot':'')+'" style="width:'+cpu+'%"></i></div><span class="val">'+cpu+'%'+(st.cores?' · '+st.cores+'c':'')+'</span></div>'+
    '<div class="srow"><span class="lab">RAM</span><div class="bar"><i class="'+(ram>88?'hot':'')+'" style="width:'+ram+'%"></i></div><span class="val">'+(st.ramUsedGB||0)+' / '+(st.ramTotalGB||0)+' GB</span></div>'+
    '<div class="shost'+(fresh?'':' off')+'"><span class="live"></span>'+esc(st.host||'PC')+(fresh?' · online '+ago(st.ts)+' ago':' · last seen '+ago(st.ts)+' ago')+(st.uptimeH?' · up '+st.uptimeH+'h':'')+'</div>';
}

function renderExternal(external){
  if(!external || !external.length){ $('extlabel').style.display='none'; $('ext').innerHTML=''; return; }
  $('extlabel').style.display='block';
  $('ext').innerHTML = external.map(a => {
    const st = statusInfo(a.status);
    const meta = shortCwd(a.cwd);
    const action = a.chat
      ? '<a class="extlink" href="'+esc(a.chat)+'" target="_blank" rel="noopener">Open in Claude ↗</a>'
      : '<div class="extnochat">running · no chat link</div>';
    return '<div class="extcard"><div class="top"><span class="name">'+esc(a.name)+'</span><span class="badge '+st.cls+'">'+esc(st.label)+'</span></div>'+(meta?'<div class="meta">'+esc(meta)+'</div>':'')+action+'</div>';
  }).join('');
}
function renderSolves(solves){
  if(!solves || !solves.length){ $('solveswrap').innerHTML=''; return; }
  $('solveswrap').innerHTML = '<div class="seclabel" style="margin-top:4px;border-top:none;padding-top:0">Solve relays · never give up</div>' + solves.map(s=>{
    const gen = (s.dispatch?'⚡ lean · ':'')+'∞ generation '+(s.generation||1);
    let st, line, actions='';
    if(s.status==='solved'){ st={label:'solved',cls:'idle'}; line=gen+(s.summary?' · '+s.summary:''); }
    else if(s.status==='stopped'){ st={label:'stopped',cls:'other'}; line=gen+' · stopped'; actions='<button class="srelay cont" data-id="'+esc(s.id)+'">Resume ›</button>'; }
    else { st={label:'solving',cls:'busy'}; line=gen+(s.autoContinues?' · '+s.autoContinues+' auto-continued':'')+(s.lastBeat?' · beat '+ago(s.lastBeat)+' ago':'')+((s.wants&&s.wants.need)?' · 💡 would help (optional): '+s.wants.need:''); actions='<button class="srelay stop" data-id="'+esc(s.id)+'">Stop relay</button>'; }
    return '<div class="extcard"><div class="top"><span class="name">'+esc(s.title||s.id)+'</span><span class="badge '+st.cls+'">'+esc(st.label)+'</span><button class="close sdel" data-id="'+esc(s.id)+'" aria-label="remove relay">✕</button></div><div class="meta">'+esc(line)+'</div>'+actions+'</div>';
  }).join('');
}
function render(agents){
  if(!agents.length){ $('list').innerHTML = '<div class="empty">No agents yet.<br>Start one and chat with it right here.<br><a href="'+START+'">New agent →</a></div>'; return; }
  $('list').innerHTML = agents.map(a => {
    const st = statusInfo(a.status);
    const endlessTag = a.mode==='endless' ? ('∞ endless'+(a.status==='thinking'?' · turn '+(a.turns||0):'')) : '';
    const meta = [endlessTag, shortCwd(a.cwd), (a.msgCount ? a.msgCount+' msg' : ''), a.lastActivity ? 'active '+ago(a.lastActivity)+' ago' : ''].filter(Boolean).join(' · ');
    return '<a class="card" href="'+START+'/chat?id='+encodeURIComponent(a.id)+'">'+
           '<div class="top"><span class="name">'+esc(a.title||a.id)+'</span>'+
           '<span class="badge '+st.cls+'">'+esc(st.label)+'</span>'+
           '<button class="close" data-id="'+esc(a.id)+'" aria-label="close agent">✕</button></div>'+
           (meta ? '<div class="meta">'+esc(meta)+'</div>' : '')+
           '<span class="chatbtn">Open chat ›</span></a>';
  }).join('');
}

$('list').addEventListener('click', async (e) => {
  const btn = e.target.closest('.close');
  if (!btn) return;
  e.preventDefault(); e.stopPropagation();
  const id = btn.dataset.id;
  if (!confirm('Close this agent? Its chat will be removed.')) return;
  btn.textContent = '·'; btn.disabled = true;
  try { await api('/chat/close', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id }) }); } catch(e){}
  refresh();
});

$('solveswrap').addEventListener('click', async (e) => {
  const del = e.target.closest('.sdel');
  if (del) {
    const id = del.dataset.id;
    if (!confirm('Remove this relay from the list?')) return;
    del.disabled = true; del.textContent = '·';
    try { await api('/solve/delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ solveId: id }) }); } catch(e){}
    return refresh();
  }
  const btn = e.target.closest('.srelay');
  if (!btn) return;
  const id = btn.dataset.id;
  const stop = btn.classList.contains('stop');
  if (stop && !confirm('Stop this relay? It will not spawn another generation. Close its terminal window separately if one is open.')) return;
  if (!stop && !confirm('Resume this stopped relay?')) { return; }
  btn.disabled = true; btn.textContent = stop ? 'stopping…' : 'resuming…';
  try { await api(stop ? '/solve/stop' : '/solve/next', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ solveId: id, force: true }) }); } catch(e){}
  refresh();
});

async function refresh(){
  let data;
  try { data = await (await api('/agents')).json(); }
  catch(e){ $('sub').textContent = 'can’t reach relay'; return; }
  const agents = data.agents || [];
  const working = agents.filter(a => (a.status==='thinking'||a.status==='busy')).length;
  renderStats(data.stats);
  $('sub').innerHTML = agents.length+' agent'+(agents.length===1?'':'s')+(working?' · '+working+' working':'');
  render(agents);
  renderSolves(data.solves || []);
  renderExternal(data.external || []);
}
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
