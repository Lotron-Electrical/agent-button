<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="theme-color" content="#0d0d0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Agents" />
<link rel="manifest" href="__START__/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<title>Spawn Agents</title>
<style>
  :root{
    --bg:#0d0d0d; --panel:#161616; --panel2:#1d1d1d; --line:#2a2a2a;
    --ink:#ece7e1; --dim:#8a847c; --accent:#C15F3C; --accent2:#e0794f; --ok:#5fb87a; --err:#d9655a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #1a1411 0%, var(--bg) 55%);
    color:var(--ink);
    font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    display:flex; flex-direction:column; min-height:100%;
    padding:max(18px,env(safe-area-inset-top)) 18px calc(18px + env(safe-area-inset-bottom));
  }
  header{display:flex; align-items:center; gap:10px; margin-bottom:18px}
  .dot{width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent)}
  h1{font-size:17px; margin:0; letter-spacing:.5px; font-weight:600; flex:1}
  h1 span{color:var(--dim); font-weight:400}
  .navlink{font-size:13px; color:var(--accent2); text-decoration:none; border:1px solid var(--line); padding:7px 11px; border-radius:10px; white-space:nowrap}
  .navlink:active{background:var(--panel)}
  label{display:block; font-size:12px; color:var(--dim); margin:0 0 7px 2px; letter-spacing:.4px; text-transform:uppercase}
  textarea{
    width:100%; min-height:128px; resize:vertical; background:var(--panel); color:var(--ink);
    border:1px solid var(--line); border-radius:14px; padding:14px; font:inherit; font-size:16px; line-height:1.45;
    outline:none; transition:border-color .15s;
  }
  textarea:focus{border-color:var(--accent)}
  .seg{display:flex; gap:8px; margin-top:6px}
  .seg button{
    flex:1; background:var(--panel); color:var(--dim); border:1px solid var(--line); border-radius:12px;
    padding:13px 0; font:inherit; font-size:17px; font-weight:600; transition:all .12s;
  }
  .seg button.on{background:var(--accent); color:#1a0f0a; border-color:var(--accent); box-shadow:0 0 16px rgba(193,95,60,.4)}
  .row{margin-top:18px}
  details{margin-top:16px; border:1px solid var(--line); border-radius:12px; background:var(--panel); overflow:hidden}
  summary{padding:13px 14px; font-size:13px; color:var(--dim); cursor:pointer; list-style:none; letter-spacing:.3px}
  summary::-webkit-details-marker{display:none}
  details[open] summary{border-bottom:1px solid var(--line); color:var(--ink)}
  .adv{padding:14px}
  input[type=text]{
    width:100%; background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:10px;
    padding:12px; font:inherit; font-size:15px; outline:none;
  }
  input[type=text]:focus{border-color:var(--accent)}
  .check{display:flex; align-items:center; gap:11px; margin-top:14px; font-size:14px; color:var(--ink)}
  .check input{width:20px; height:20px; accent-color:var(--accent)}
  .spacer{flex:1; min-height:18px}
  .spawn{
    width:100%; padding:20px; border:none; border-radius:18px; font:inherit; font-size:20px; font-weight:700;
    letter-spacing:1px; color:#1a0f0a; cursor:pointer; transition:transform .08s, filter .15s;
    background:linear-gradient(135deg,var(--accent2),var(--accent)); box-shadow:0 10px 30px rgba(193,95,60,.35);
  }
  .spawn:active{transform:scale(.985); filter:brightness(1.08)}
  .spawn[disabled]{opacity:.5; box-shadow:none}
  .status{
    margin-top:16px; min-height:22px; font-size:14px; text-align:center; color:var(--dim);
    transition:color .2s; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .status.go{color:var(--accent2)} .status.ok{color:var(--ok)} .status.err{color:var(--err)}
  .spin{width:13px; height:13px; border:2px solid currentColor; border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  .hist{margin-top:18px; font-size:12px; color:var(--dim); line-height:1.7}
  .hist .h{display:flex; justify-content:space-between; gap:10px; border-top:1px solid var(--line); padding:6px 2px}
  .hist .h span:first-child{overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
</style>
</head>
<body>
  <header><div class="dot"></div><h1>SPAWN AGENTS <span>// your PC</span></h1><a class="navlink" href="__START__/agents">Agents →</a></header>

  <label for="task">Task</label>
  <textarea id="task" placeholder="What should the agents work on?&#10;e.g. review open PRs and summarise risks" autofocus></textarea>

  <div class="row">
    <label>Agents</label>
    <div class="seg" id="seg">
      <button data-n="1" class="on">1</button>
      <button data-n="2">2</button>
      <button data-n="3">3</button>
      <button data-n="4">4</button>
    </div>
  </div>

  <details>
    <summary>Advanced</summary>
    <div class="adv">
      <label for="cwd">Working folder (optional)</label>
      <input id="cwd" type="text" placeholder="default: home folder" autocapitalize="off" autocorrect="off" spellcheck="false" />
      <div class="check">
        <input id="ac" type="checkbox" checked />
        <label for="ac" style="margin:0; text-transform:none; font-size:14px; color:var(--ink)">Auto-close tabs when the agent finishes</label>
      </div>
    </div>
  </details>

  <div class="spacer"></div>

  <button class="spawn" id="go">SPAWN</button>
  <div class="status" id="status"></div>
  <div class="hist" id="hist"></div>

<script>
const SECRET = "__SECRET__";
const $ = (id) => document.getElementById(id);
let count = 1;

$('seg').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  count = +b.dataset.n;
  [...$('seg').children].forEach(x => x.classList.toggle('on', x === b));
  haptic(8);
});

function haptic(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }
function api(p, opts={}){
  return fetch(p, { ...opts, headers: { 'Authorization':'Bearer '+SECRET, ...(opts.headers||{}) } });
}
function setStatus(text, cls){
  const el = $('status'); el.className = 'status ' + (cls||'');
  el.innerHTML = (cls === 'go' ? '<div class="spin"></div>' : '') + text;
}
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

function pushHist(task, n, okText){
  const list = JSON.parse(localStorage.getItem('hist')||'[]');
  list.unshift({ t: task.slice(0,48), n, r: okText, ts: new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) });
  localStorage.setItem('hist', JSON.stringify(list.slice(0,5)));
  renderHist();
}
function renderHist(){
  const list = JSON.parse(localStorage.getItem('hist')||'[]');
  $('hist').innerHTML = list.map(h =>
    `<div class="h"><span>${h.ts} · ${h.n}× ${escapeHtml(h.t)}</span><span>${h.r}</span></div>`).join('');
}
function escapeHtml(s){ return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function spawn(){
  const task = $('task').value.trim();
  if (!task){ setStatus('Type a task first', 'err'); $('task').focus(); return; }
  const cwd = $('cwd').value.trim();
  const autoClose = $('ac').checked;
  $('go').disabled = true;
  haptic(20);
  setStatus('Sending to your PC…', 'go');
  let id;
  try {
    const r = await api('/enqueue', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ task, count, cwd, autoClose }) });
    if (!r.ok) throw new Error('relay ' + r.status);
    id = (await r.json()).id;
  } catch (e){
    setStatus('Could not reach relay (' + e.message + ')', 'err'); $('go').disabled = false; return;
  }
  setStatus('Queued · waiting for your PC…', 'go');
  // poll for the poller's confirmation
  for (let i = 0; i < 40; i++){
    await sleep(1500);
    let j;
    try { j = await (await api('/status/' + id)).json(); } catch(e){ continue; }
    if (j.status === 'taken') setStatus('PC picked it up · launching…', 'go');
    if (j.status === 'spawned'){
      setStatus('Spawned ' + j.spawned + ' agent' + (j.spawned===1?'':'s') + ' on your PC', 'ok');
      haptic([15,40,15]); pushHist(task, count, '✓');
      $('go').disabled = false; $('task').value = ''; return;
    }
    if (j.status === 'error'){
      setStatus('PC error: ' + (j.error||'unknown'), 'err'); pushHist(task, count, '✕');
      $('go').disabled = false; return;
    }
  }
  setStatus('No PC response · is the poller running?', 'err');
  $('go').disabled = false;
}
$('go').addEventListener('click', spawn);
renderHist();
</script>
</body>
</html>
